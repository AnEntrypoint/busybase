name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: busybase-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: busybase-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: busybase-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone
        run: bun build src/server.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (${{ github.sha }})
          body: |
            Automated build from commit ${{ github.sha }}

            **Downloads:**
            - `busybase-linux-x64` — Linux x64
            - `busybase-macos-arm64` — macOS Apple Silicon
            - `busybase-windows-x64.exe` — Windows x64
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
