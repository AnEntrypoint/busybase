<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusyBase Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; background: #1e293b; color: #e2e8f0; display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
    #sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid #334155; }
    #sidebar-header .logo { font-size: 18px; font-weight: 700; color: #fff; }
    #sidebar-header .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
    #nav { padding: 12px 8px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #94a3b8; margin-bottom: 2px; transition: background 0.15s, color 0.15s; user-select: none; }
    .nav-item:hover { background: #334155; color: #e2e8f0; }
    .nav-item.active { background: #6366f1; color: #fff; }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; background: #fff; display: flex; align-items: center; gap: 12px; }
    #topbar-title { font-size: 16px; font-weight: 600; }
    #app { flex: 1; padding: 24px; overflow: auto; }
    #loading { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">BusyBase</div>
      <div class="sub">Studio</div>
    </div>
    <nav id="nav">
      <div class="nav-item active" data-panel="tables"><span class="nav-icon">&#9783;</span>Tables</div>
      <div class="nav-item" data-panel="auth"><span class="nav-icon">&#128100;</span>Auth</div>
      <div class="nav-item" data-panel="realtime"><span class="nav-icon">&#9889;</span>Realtime</div>
      <div class="nav-item" data-panel="sql"><span class="nav-icon">&#128269;</span>SQL</div>
      <div class="nav-item" data-panel="settings"><span class="nav-icon">&#9881;</span>Settings</div>
    </nav>
  </div>
  <div id="main">
    <div id="topbar">
      <div id="topbar-title">Tables</div>
    </div>
    <div id="app"><div id="loading">Loading...</div></div>
  </div>

  <script type="module">
    const panels = { tables: 'Tables', auth: 'Auth', realtime: 'Realtime', sql: 'SQL', settings: 'Settings' };
    let currentPanel = 'tables';
    let moduleCache = {};

    const app = document.getElementById('app');
    const topbarTitle = document.getElementById('topbar-title');

    async function loadPanel(name) {
      topbarTitle.textContent = panels[name];
      app.innerHTML = '<div id="loading">Loading...</div>';
      try {
        if (!moduleCache[name]) {
          moduleCache[name] = await import(`./${name}.js`);
        }
        app.innerHTML = '';
        await moduleCache[name].render(app);
      } catch (e) {
        app.innerHTML = `<div style="color:#ef4444">Error loading panel: ${e.message}</div>`;
      }
    }

    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        currentPanel = el.dataset.panel;
        loadPanel(currentPanel);
      });
    });

    loadPanel(currentPanel);
  </script>
</body>
</html>
